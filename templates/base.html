<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="google-site-verification" content="b2tBxoD-YNqfen_GG32DAMyzB0NMAoD5S3F_ntzXqOE" />
    <meta name="description" content="{% block meta_desc %}Tawtheef Egypt - Find jobs in Egypt. توظيف مصر - أحدث الوظائف في مصر{% endblock %}">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="{% block og_title %}Tawtheef Egypt | توظيف مصر{% endblock %}">
    <meta property="og:description" content="{% block og_desc %}Find your next career move in Egypt. Browse thousands of jobs across all industries.{% endblock %}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ request.url }}">
    <link rel="canonical" href="{{ request.url }}">
    <title>{% block title %}Tawtheef Egypt | توظيف مصر{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Adsterra Native Banner -->
    <script async="async" data-cfasync="false" src="https://pl29543682.effectivecpmnetwork.com/ae6be3a1f64787c0832eb3590e1f5787/invoke.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* FIX: prevent horizontal scroll globally */
        html, body {
            max-width: 100%;
            overflow-x: hidden;
        }

        :root {
            --navy:      #0b1724;
            --navy-2:    #112035;
            --navy-3:    #1a2f4a;
            --gold:      #c8a84b;
            --gold-h:    #d4b55e;
            --gold-soft: rgba(200,168,75,0.10);
            --gold-pale: #fdf6e3;
            --white:     #ffffff;
            --bg:        #f3f5f8;
            --border:    #e2e6ed;
            --border-2:  #ccd2db;
            --muted:     #8a94a6;
            --body:      #2d3748;
            --head:      #0b1724;
            --font:      'Outfit', sans-serif;
            --font-ar:   'Cairo', sans-serif;
            --r:         10px;
            --r-sm:      7px;
            --r-lg:      14px;
            --sh:        0 1px 4px rgba(0,0,0,0.05), 0 4px 16px rgba(0,0,0,0.04);
            --sh-hover:  0 4px 24px rgba(0,0,0,0.10);
            --t:         0.18s ease;
        }

        html { -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--body);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        a { color: inherit; text-decoration: none; }

        /* ── NAVBAR ── */
        .nav {
            background: #ffffff;
            position: sticky;
            top: 0;
            z-index: 200;
            border-bottom: 1px solid var(--border);
        }

        .nav-wrap {
            max-width: 1260px;
            margin: 0 auto;
            padding: 0 16px;
            height: 56px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Logo */
        .logo { display: flex; align-items: center; gap: 8px; flex-shrink: 0; min-width: 0; }

        .logo-icon {
            width: 36px; height: 36px;
            flex-shrink: 0;
            overflow: hidden;
        }

        .logo-symbol {
            width: 36px; height: 36px;
            object-fit: contain;
        }

        .logo-words { line-height: 1.15; min-width: 0; }
        .logo-en { font-size: 16px; font-weight: 800; color: var(--navy); letter-spacing: -0.2px; display: block; white-space: nowrap; }
        .logo-en span { color: var(--gold); }
        .logo-ar { font-family: var(--font-ar); font-size: 11px; color: var(--muted); font-weight: 600; display: block; white-space: nowrap; }

        /* Search */
        .nav-form { flex: 1; display: flex; gap: 6px; max-width: 420px; margin-left: auto; min-width: 0; }

        .nav-form input {
            flex: 1; min-width: 0;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: var(--r-sm);
            padding: 8px 12px;
            font-family: var(--font);
            font-size: 13px;
            color: var(--head);
            outline: none;
            transition: border-color var(--t);
        }

        .nav-form input::placeholder { color: var(--muted); }
        .nav-form input:focus { border-color: var(--gold); }

        .nav-btn {
            padding: 8px 14px;
            background: var(--gold);
            color: var(--navy);
            border: none;
            border-radius: var(--r-sm);
            font-family: var(--font);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            flex-shrink: 0;
            white-space: nowrap;
            transition: background var(--t);
        }

        .nav-btn:hover { background: var(--gold-h); }

        /* ── LAYOUT ── */
        .wrap { max-width: 1260px; margin: 0 auto; padding: 0 16px; }
        .page { padding: 20px 0 72px; }

        .grid {
            display: grid;
            grid-template-columns: 236px 1fr;
            gap: 20px;
            align-items: start;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            background: var(--white);
            border-radius: var(--r-lg);
            border: 1px solid var(--border);
            overflow: hidden;
            position: sticky;
            top: 76px;
            box-shadow: var(--sh);
        }

        .sidebar-head {
            padding: 13px 18px;
            background: var(--navy);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: var(--gold);
        }

        .sidebar-head .ar {
            font-family: var(--font-ar);
            text-transform: none;
            letter-spacing: 0;
            font-size: 11.5px;
            color: rgba(255,255,255,0.35);
            font-weight: 600;
        }

        .cat-list { max-height: 540px; overflow-y: auto; }
        .cat-list::-webkit-scrollbar { width: 3px; }
        .cat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .cat-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 18px;
            font-size: 12.5px;
            font-weight: 600;
            color: var(--body);
            border-left: 3px solid transparent;
            border-bottom: 1px solid var(--bg);
            transition: all var(--t);
        }

        .cat-link:hover { background: var(--gold-soft); color: var(--navy); border-left-color: var(--gold); }
        .cat-link.on { background: var(--gold-pale); color: var(--navy); border-left-color: var(--gold); font-weight: 700; }

        .cat-n {
            font-size: 10.5px; font-weight: 700;
            background: var(--bg); color: var(--muted);
            padding: 2px 7px; border-radius: 20px;
            flex-shrink: 0;
        }

        .cat-link.on .cat-n { background: var(--gold); color: var(--navy); }

        /* ── BUTTONS ── */
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 5px;
            padding: 9px 18px;
            border-radius: var(--r-sm);
            font-family: var(--font);
            font-weight: 700; font-size: 13px;
            cursor: pointer; border: none;
            transition: all var(--t);
            white-space: nowrap;
        }

        .btn-gold { background: var(--gold); color: var(--navy); }
        .btn-gold:hover { background: var(--gold-h); }

        .btn-outline { background: #fff; color: var(--body); border: 1.5px solid var(--border); }
        .btn-outline:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-pale); }

        /* ── JOB CARD ── */
        .job-card {
            background: var(--white);
            border-radius: var(--r);
            border: 1px solid var(--border);
            padding: 18px 20px;
            margin-bottom: 9px;
            box-shadow: var(--sh);
            transition: all var(--t);
            display: block;
            overflow: hidden;
        }

        .job-card:hover { border-color: var(--gold); box-shadow: var(--sh-hover); transform: translateY(-2px); }

        .jc-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 7px; }

        .jc-title { font-size: 14.5px; font-weight: 700; color: var(--head); line-height: 1.35; }
        .jc-title:hover { color: var(--gold); }

        .jc-company { font-size: 13px; color: var(--body); font-weight: 600; margin-bottom: 7px; }

        .jc-meta {
            display: flex; flex-wrap: wrap; gap: 10px;
            font-size: 12.5px; color: var(--muted); font-weight: 500;
            margin-bottom: 10px;
            align-items: center;
        }

        .jc-meta-item { display: flex; align-items: center; gap: 4px; }
        .jc-meta-item svg { width: 12px; height: 12px; flex-shrink: 0; }

        .jc-tags { display: flex; flex-wrap: wrap; gap: 5px; }

        .tag {
            font-size: 11px; font-weight: 600;
            padding: 3px 9px; border-radius: 20px;
        }

        .t-cat  { background: var(--gold-soft); color: #7a5800; border: 1px solid rgba(200,168,75,0.2); }
        .t-sal  { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
        .t-type { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
        .t-date { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }

        .apply-pill {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 6px 13px;
            background: var(--navy); color: var(--gold);
            border: 1px solid var(--gold);
            border-radius: 20px;
            font-size: 11.5px; font-weight: 700;
            transition: all var(--t);
            flex-shrink: 0;
            white-space: nowrap;
        }

        .apply-pill:hover { background: var(--gold); color: var(--navy); }

        /* ── PAGE HEADER ── */
        .ph { margin-bottom: 20px; }
        .ph h1 { font-size: 24px; font-weight: 800; color: var(--head); letter-spacing: -0.4px; }
        .ph p { color: var(--muted); font-size: 13.5px; margin-top: 4px; font-weight: 500; }

        /* ── AD SLOT ── */
        .ad {
            border-radius: var(--r);
            padding: 8px;
            text-align: center;
            margin-bottom: 14px;
            background: var(--white);
            overflow: hidden;
            max-width: 100%;
        }

        /* force ad iframes to not overflow */
        .ad iframe { max-width: 100% !important; }

        /* ── SEARCH BAR (desktop only on search page) ── */
        .sbar {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex; gap: 8px; align-items: center;
            box-shadow: var(--sh);
        }

        .sbar input {
            flex: 1; min-width: 0;
            border: 1.5px solid var(--border);
            border-radius: var(--r-sm);
            padding: 9px 14px;
            font-family: var(--font);
            font-size: 13.5px;
            outline: none;
            background: var(--bg);
            color: var(--head);
            transition: all var(--t);
        }

        .sbar input:focus { border-color: var(--gold); background: #fff; }

        /* ── RESULTS META ── */
        .rmeta {
            font-size: 13px; color: var(--muted); font-weight: 500;
            margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .rmeta strong { color: var(--head); font-weight: 700; }

        /* ── PAGINATION ── */
        .pages { display: flex; justify-content: center; gap: 4px; margin-top: 28px; flex-wrap: wrap; }

        .pg {
            min-width: 32px; height: 32px; padding: 0 8px;
            display: flex; align-items: center; justify-content: center;
            border-radius: var(--r-sm);
            font-size: 12.5px; font-weight: 700;
            border: 1.5px solid var(--border);
            color: var(--muted); background: var(--white);
            transition: all var(--t);
        }

        .pg:hover { border-color: var(--gold); color: var(--gold); }
        .pg.on { background: var(--navy); color: var(--gold); border-color: var(--navy); }

        /* ── EMPTY ── */
        .empty {
            text-align: center; padding: 52px 20px;
            background: var(--white); border-radius: var(--r-lg);
            border: 1px solid var(--border);
        }

        .empty h3 { font-size: 17px; font-weight: 700; color: var(--head); margin-bottom: 5px; }
        .empty p { color: var(--muted); font-size: 13.5px; }

        /* ── BREADCRUMB ── */
        .bc { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--muted); margin-bottom: 18px; flex-wrap: wrap; font-weight: 500; }
        .bc a { color: var(--body); font-weight: 600; }
        .bc a:hover { color: var(--gold); }

        /* ── HERO ── */
        .hero {
            background: var(--navy);
            padding: 52px 20px 48px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute; inset: 0;
            background-image: radial-gradient(rgba(200,168,75,0.04) 1.5px, transparent 1.5px);
            background-size: 22px 22px;
        }

        .hero-glow {
            position: absolute;
            width: 500px; height: 300px;
            background: radial-gradient(ellipse, rgba(200,168,75,0.07) 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .hero-inner { position: relative; z-index: 1; max-width: 620px; margin: 0 auto; }

        .hero-badge {
            display: inline-block;
            font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
            color: var(--gold);
            border: 1px solid rgba(200,168,75,0.25);
            padding: 5px 14px; border-radius: 20px;
            margin-bottom: 18px;
            background: rgba(200,168,75,0.05);
        }

        .hero h1 {
            font-size: 36px; font-weight: 900;
            color: #fff; line-height: 1.12; letter-spacing: -1px;
            margin-bottom: 6px;
        }

        .hero h1 em { color: var(--gold); font-style: normal; }

        .hero-ar {
            font-family: var(--font-ar);
            font-size: 17px; color: rgba(255,255,255,0.4);
            font-weight: 600; margin-bottom: 26px;
        }

        .hero-search {
            display: flex; gap: 7px;
            max-width: 500px; margin: 0 auto 28px;
        }

        .hero-search input {
            flex: 1; min-width: 0;
            padding: 13px 18px;
            border-radius: var(--r-sm);
            border: 1.5px solid var(--navy-3);
            font-family: var(--font); font-size: 13.5px;
            outline: none;
            background: var(--navy-2); color: #fff;
            transition: border-color var(--t);
        }

        .hero-search input:focus { border-color: var(--gold); }
        .hero-search input::placeholder { color: rgba(255,255,255,0.28); }

        .hero-search button {
            padding: 13px 22px;
            background: var(--gold); color: var(--navy);
            border: none; border-radius: var(--r-sm);
            font-family: var(--font); font-size: 14px; font-weight: 800;
            cursor: pointer; flex-shrink: 0;
            transition: all var(--t);
        }

        .hero-search button:hover { background: var(--gold-h); }

        .hero-stats { display: flex; justify-content: center; gap: 36px; flex-wrap: wrap; }

        .hstat { text-align: center; color: rgba(255,255,255,0.45); font-size: 12px; font-weight: 500; }
        .hstat strong { display: block; color: var(--gold); font-size: 21px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 1px; }

        /* ── FOOTER ── */
        footer {
            background: var(--navy);
            padding: 22px 20px;
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 12.5px; font-weight: 500;
            border-top: 1px solid var(--navy-3);
        }

        footer .ar { font-family: var(--font-ar); color: var(--gold); font-weight: 700; }

        /* ── MOBILE CATEGORY BUTTON ── */
        .mobile-cat-btn {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 11px 16px;
            background: var(--white);
            border: 1.5px solid var(--border);
            border-radius: var(--r-sm);
            font-family: var(--font);
            font-size: 13px;
            font-weight: 700;
            color: var(--navy);
            cursor: pointer;
            width: 100%;
            justify-content: center;
            transition: all var(--t);
            margin-bottom: 14px;
        }

        .mobile-cat-btn:hover { border-color: var(--gold); background: var(--gold-pale); }

        /* ── CATEGORY OVERLAY ── */
        .cat-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 300;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .cat-overlay.show { display: flex; }

        .cat-overlay-card {
            background: var(--white);
            border-radius: var(--r-lg);
            width: 100%;
            max-width: 400px;
            max-height: 80vh;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .cat-overlay-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: var(--navy);
            color: var(--gold);
            font-weight: 700;
            font-size: 15px;
        }

        .cat-overlay-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
        }

        .cat-overlay-list {
            overflow-y: auto;
            max-height: calc(80vh - 56px);
        }

        .cat-overlay-item {
            padding: 14px 20px;
            border-bottom: 1px solid var(--bg);
        }

        .cat-overlay-item:last-child { border-bottom: none; }

        /* mobile ad — hidden on desktop */
        .mobile-ad { display: none; }

        /* ── DESKTOP ── */
        @media (min-width: 901px) {
            .nav-wrap { padding: 0 20px; height: 60px; gap: 14px; }
            .logo-icon { width: 48px; height: 48px; }
            .logo-symbol { width: 48px; height: 48px; }
            .logo-en { font-size: 20px; }
            .logo-ar { font-size: 13px; }
            .wrap { padding: 0 20px; }
        }

        /* ── TABLET / MOBILE ── */
        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; }
            .sidebar-desktop { display: none; }
            .mobile-cat-btn { display: flex; }
            .mobile-ad { display: block; }
        }

        /* ── MOBILE ── */
        @media (max-width: 640px) {
            .hero { padding: 32px 16px 28px; }
            .hero h1 { font-size: 24px; letter-spacing: -0.5px; }
            .hero-ar { font-size: 14px; }
            .hero-search { flex-direction: column; gap: 8px; }
            .hero-search input, .hero-search button { width: 100%; }
            .hero-stats { gap: 16px; }
            .hstat strong { font-size: 17px; }
            .page { padding: 14px 0 52px; }
            .ph h1 { font-size: 19px; }
            .job-card { padding: 13px 14px; }
            .jc-top { flex-direction: column; gap: 8px; }
            .apply-pill { width: 100%; justify-content: center; }
            .jc-title { font-size: 14px; }
            .jc-company { font-size: 12px; }
            .jc-meta { font-size: 12px; gap: 8px; }
            /* hide search bar on search page — use nav search instead */
            .sbar { display: none; }
            .rmeta { flex-direction: column; gap: 3px; font-size: 12px; align-items: flex-start; }
            .bc { font-size: 11.5px; }
            footer { font-size: 11.5px; }
            .pages { gap: 3px; }
            .pg { min-width: 28px; height: 28px; font-size: 11px; }
        }

        @media (max-width: 380px) {
            .hero h1 { font-size: 20px; }
            .hero-badge { font-size: 9px; padding: 4px 10px; }
            .hstat { font-size: 10px; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

<nav class="nav">
    <div class="nav-wrap">
        <a href="/" class="logo">
            <div class="logo-icon">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="logo-symbol">
            </div>
            <div class="logo-words">
                <span class="logo-en">Taw<span>theef</span></span>
                <span class="logo-ar">توظيف مصر</span>
            </div>
        </a>
        <form class="nav-form" action="/search" method="get">
            <input type="text" name="q" placeholder="Search jobs..." value="{{ request.args.get('q', '') }}">
            <button type="submit" class="nav-btn">Go</button>
        </form>
    </div>
</nav>

{% block hero %}{% endblock %}

<div class="wrap page">
    <!-- Mobile Category Button — shows ABOVE content on mobile only -->
    <button class="mobile-cat-btn" id="catBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 4h18M3 9h12M3 14h18M3 19h8"/></svg>
        Browse Categories · تصفح التصنيفات
    </button>

    {% block content %}{% endblock %}
</div>

<!-- Category Overlay -->
<div class="cat-overlay" id="catOverlay">
    <div class="cat-overlay-card">
        <div class="cat-overlay-head">
            <span>Select a Category · اختر تصنيف</span>
            <button class="cat-overlay-close" id="catClose">✕</button>
        </div>
        <div class="cat-overlay-list">
            <a href="/search" class="cat-link cat-overlay-item" onclick="closeOverlay()">
                <span>All Categories · الكل</span>
            </a>
            {% for cat in categories %}
            <a href="/search?category={{ cat.category }}" class="cat-link cat-overlay-item" onclick="closeOverlay()">
                <span>{{ cat.category }}</span>
                <span class="cat-n">{{ cat.count }}</span>
            </a>
            {% endfor %}
        </div>
    </div>
</div>

<!-- Adsterra Banner 320x50 -->
<div style="text-align:center; margin:10px 0; overflow:hidden;">
    <script>
      atOptions = {'key':'397822ac95e63c1a331926eb353a041a','format':'iframe','height':50,'width':320,'params':{}};
    </script>
    <script src="https://www.highperformanceformat.com/397822ac95e63c1a331926eb353a041a/invoke.js"></script>
