{% extends 'base.html' %}
{% block title %}Sign Up — Tawtheef Egypt{% endblock %}
{% block hero %}{% endblock %}

{% block content %}
<div style="max-width:440px; margin:60px auto; padding:0 20px;">
    <div style="background:var(--card-bg); border-radius:var(--r-lg); padding:40px 32px; box-shadow:var(--sh); border:1px solid var(--border);">
        <h1 style="font-size:24px; font-weight:800; color:var(--head); margin-bottom:8px; text-align:center;">Create Account</h1>
        <p style="text-align:center; color:var(--muted); margin-bottom:28px;">Join Tawtheef Egypt today</p>

        <div id="firebaseui-container"></div>

        <div id="error-msg" style="color:#ef4444; font-size:13px; text-align:center; margin-top:12px;"></div>

        <p style="text-align:center; margin-top:20px; font-size:13px; color:var(--muted);">
            Already have an account? <a href="/login" style="color:var(--gold); font-weight:600;">Sign In</a>
        </p>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/ui/6.0.1/firebase-ui-auth.js"></script>
<link rel="stylesheet" href="https://www.gstatic.com/firebasejs/ui/6.0.1/firebase-ui-auth.css"/>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBJw6RWUrIDikSIlT2pT9VwN89KaR1b4II",
        authDomain: "tawtheef-egypt.firebaseapp.com",
        projectId: "tawtheef-egypt",
        storageBucket: "tawtheef-egypt.firebasestorage.app",
        messagingSenderId: "5912368241",
        appId: "1:5912368241:web:755bcee8db27da0601b7d0"
    };
    firebase.initializeApp(firebaseConfig);

    const uiConfig = {
        signInOptions: [
            firebase.auth.GoogleAuthProvider.PROVIDER_ID,
            firebase.auth.EmailAuthProvider.PROVIDER_ID
        ],
        signInSuccessUrl: '/',
        callbacks: {
            signInSuccessWithAuthResult: function(authResult) {
                const user = authResult.user;
                fetch('/api/auth/session', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        uid: user.uid,
                        email: user.email,
                        name: user.displayName || '',
                        picture: user.photoURL || ''
                    })
                }).then(() => {
                    window.location.href = '/';
                });
                return false;
            }
        }
    };

    const ui = new firebaseui.auth.AuthUI(firebase.auth());
    ui.start('#firebaseui-container', uiConfig);
</script>
{% endblock %}
